<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QMMFND - 量子启发多模态虚假新闻检测系统</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/responsive.css">
    <!-- Element UI -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/element-ui/2.15.14/theme-chalk/index.min.css">
    <!-- ECharts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/echarts/5.4.3/echarts.min.js"></script>
    <!-- Vue.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/vue/2.7.14/vue.min.js"></script>
    <!-- Element UI -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/element-ui/2.15.14/index.min.js"></script>
    <!-- Axios -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/axios/1.4.0/axios.min.js"></script>
</head>
<body>
    <div id="app">
        <!-- 登录组件 -->
        <div v-if="!currentUser" class="login-container">
            <login @login="handleLogin"></login>
        </div>
        
        <!-- 主应用 -->
        <div v-else class="main-app">
            <!-- 导航栏 -->
            <nav class="navbar">
                <div class="navbar-brand">
                    <h1>🔬 QMMFND 系统</h1>
                    <span class="subtitle">量子启发多模态虚假新闻检测</span>
                </div>
                <div class="navbar-menu">
                    <button @click="activeMenu = 'dashboard'" :class="{active: activeMenu === 'dashboard'}">
                        📊 数据看板
                    </button>
                    <button @click="activeMenu = 'detection'" :class="{active: activeMenu === 'detection'}">
                        🔍 新闻检测
                    </button>
                    <button @click="activeMenu = 'visualization'" :class="{active: activeMenu === 'visualization'}">
                        📈 模型可视化
                    </button>
                    <button @click="activeMenu = 'logs'" :class="{active: activeMenu === 'logs'}">
                        📋 操作日志
                    </button>
                </div>
                <div class="navbar-user">
                    <span class="user-info">
                        👤 {{ currentUser.username }} ({{ currentUser.role === 'admin' ? '管理员' : currentUser.role === 'operator' ? '操作员' : '分析师' }})
                    </span>
                    <button @click="handleLogout" class="logout-btn">退出登录</button>
                </div>
            </nav>
            
            <!-- 主内容区域 -->
            <div class="container">
                <!-- 数据看板 -->
                <dashboard v-if="activeMenu === 'dashboard'" :stats="stats" :trend="trendData"></dashboard>
                
                <!-- 新闻检测界面 -->
                <detection v-if="activeMenu === 'detection'" @detect="handleDetection"></detection>
                
                <!-- 模型可视化 -->
                <visualization v-if="activeMenu === 'visualization'" :flow="modelFlow" :components="quantumComponents"></visualization>
                
                <!-- 操作日志 -->
                <logs v-if="activeMenu === 'logs'" :logs="systemLogs"></logs>
            </div>
        </div>
    </div>

    <!-- 组件脚本 -->
    <script src="js/components.js"></script>
    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
