version: '3.8'

services:
  # Flask后端服务
  backend:
    build: .
    container_name: qmmfnd-backend
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=production
      - FLASK_APP=app.py
      - SECRET_KEY=your-secret-key-here
      - JWT_SECRET_KEY=your-jwt-secret-key-here
    volumes:
      - ./backend:/app
      - ./data:/app/data
    restart: unless-stopped
    networks:
      - qmmfnd-network

  # MySQL数据库 (可选)
  # db:
  #   image: mysql:8.0
  #   container_name: qmmfnd-db
  #   environment:
  #     MYSQL_ROOT_PASSWORD: root123456
  #     MYSQL_DATABASE: qmmfnd
  #     MYSQL_USER: qmmfnd
  #     MYSQL_PASSWORD: qmmfnd123456
  #   ports:
  #     - "3306:3306"
  #   volumes:
  #     - mysql-data:/var/lib/mysql
  #   restart: unless-stopped
  #   networks:
  #     - qmmfnd-network

  # Nginx反向代理 (可选)
  # nginx:
  #   image: nginx:alpine
  #   container_name: qmmfnd-nginx
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./nginx.conf:/etc/nginx/nginx.conf:ro
  #     - ./frontend:/usr/share/nginx/html:ro
  #   depends_on:
  #     - backend
  #   restart: unless-stopped
  #   networks:
  #     - qmmfnd-network

volumes:
  mysql-data:

networks:
  qmmfnd-network:
    driver: bridge
